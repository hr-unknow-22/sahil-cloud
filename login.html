<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TG Cloud</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container login-box">
    <h1>🔐 Access Storage</h1>
    <input type="password" id="passInput" placeholder="Enter Password">
    <button onclick="checkLogin()">Unlock</button>
    <p id="loginMsg" class="msg"></p>
  </div>
  <script>
    function checkLogin() {
      const pass = document.getElementById("passInput").value;
      // Simple client-side password (Change it if needed)
      if (pass === "mysecret123") {
        localStorage.setItem("tg_auth", "true");
        window.location.href = "dashboard.html";
      } else {
        document.getElementById("loginMsg").textContent = "❌ Galat Password!";
      }
    }
  </script>
</body>
</html>
