<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TG Cloud</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-container">
    <div class="glass-card">
      <div class="logo">☁️ TG Cloud</div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Enter credentials to access your storage</p>
      <form id="loginForm">
        <div class="input-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="e.g. admin" required>
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="login-btn">🔓 Unlock Dashboard</button>
      </form>
      <p id="loginMsg" class="msg"></p>
      <div class="footer">Secure Client-Side Auth • No Server DB</div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
