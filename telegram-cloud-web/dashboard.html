<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - TG Cloud</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📦 Telegram Cloud Storage</h1>
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </header>

    <div class="upload-section">
      <input type="file" id="fileInput" hidden>
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📤 Upload File</button>
      <p id="uploadStatus" class="status"></p>
    </div>

    <h2>📄 Your Files</h2>
    <div id="fileList" class="file-list">Loading...</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
