<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sahil Cloud</title>
<style>
body{
background:#111;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:#222;
padding:20px;
border-radius:10px;
width:300px;
}
input{
width:100%;
padding:10px;
margin-top:10px;
}
button{
width:100%;
padding:10px;
margin-top:10px;
}
</style>
</head>
<body>

<div class="box">
<h2>Sahil Cloud</h2>

<input type="text" id="user" placeholder="Username">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<script>
let attempts=0;

function login(){

let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if(user==="AdminSahil" && pass==="Sahil@2741"){
document.getElementById("msg").innerHTML="Welcome!";
}
else{

attempts++;

if(attempts==1){
document.getElementById("msg").innerHTML="Wrong Password";
}

if(attempts>=2){
document.body.style.background="red";
document.getElementById("msg").innerHTML="WARNING!";
}
}
}
</script>

</body>
</html>
