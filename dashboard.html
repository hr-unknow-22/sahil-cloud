<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{
    background:#111827;
    color:white;
    font-family:Arial;
    text-align:center;
    padding-top:50px;
}

.box{
    width:90%;
    max-width:500px;
    margin:auto;
    background:#1f2937;
    padding:20px;
    border-radius:15px;
}

input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

button{
    background:#2563eb;
    color:white;
}
</style>

</head>
<body>

<div class="box">

<h2>📁 Telegram Cloud Drive</h2>

<input type="file" id="fileInput">

<button onclick="uploadFile()">
Upload File
</button>

<p id="status"></p>

</div>

<script>

async function uploadFile(){

    let file =
    document.getElementById("fileInput").files[0];

    if(!file){
        alert("Select file first");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch(
    "https://sahil.sahilsuthar687.workers.dev/",
    {
        method:"POST",
        body:formData
    });

    let data = await res.json();

    document.getElementById("status").innerText =
    "Upload Complete ✅";

    console.log(data);
}

</script>

</body>
</html>
