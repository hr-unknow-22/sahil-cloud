<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cloud Drive V3</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

.box{
max-width:600px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:15px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}

input{
background:#334155;
color:white;
}

button{
background:#2563eb;
color:white;
cursor:pointer;
}

.file{
background:#111827;
padding:10px;
margin-top:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
}
</style>

</head>

<body>

<div class="box">

<h2>📁 Cloud Drive V3</h2>

<input id="worker" placeholder="https://sahil.sahilsuthar687.workers.dev/">

<input type="file" id="file">

<button onclick="upload()">Upload</button>

<h3>📂 Files</h3>
<div id="list"></div>

</div>

<script>

let WORKER = "";

async function upload(){

WORKER = document.getElementById("worker").value;

let file = document.getElementById("file").files[0];

let form = new FormData();
form.append("file", file);

await fetch(WORKER, {
method:"POST",
body:form
});

loadFiles();

}

async function loadFiles(){

let res = await fetch(WORKER + "/files");
let data = await res.json();

let box = document.getElementById("list");
box.innerHTML = "";

data.forEach(f => {

box.innerHTML += `
<div class="file">

<div>📄 ${f.name}</div>

<div>
<button onclick="del('${f.id}')">Delete</button>
</div>

</div>
`;

});

}

async function del(id){
await fetch(WORKER + "/delete/" + id);
loadFiles();
}

</script>

</body>
</html>
